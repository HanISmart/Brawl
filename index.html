<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brawl - Haunted House Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud" aria-live="polite">
    <h1>Brawl: House of Shadows</h1>
    <p>Split screen: Survivor uses WASD. Hunter uses Arrow Keys.</p>
    <p>E opens a nearby door. F closes a nearby door.</p>
    <p>Scale is stylized: 1 meter = 140 game units.</p>
  </div>

  <script src="game-data.js"></script>
  <script src="game.js"></script>
</body>
</html>
